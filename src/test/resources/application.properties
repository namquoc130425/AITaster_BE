spring.application.name=AiTaster
spring.main.allow-circular-references=true

spring.datasource.url=jdbc:h2:mem:aitaster_test;MODE=MySQL;NON_KEYWORDS=USER;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test-password

spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=test-api-key
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3
spring.ai.google.genai.chat.options.response-mime-type=application/json
spring.ai.google.genai.embedding.api-key=test-api-key
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
spring.ai.google.genai.embedding.text.options.dimensions=768
spring.ai.google.genai.embedding.text.options.task-type=SEMANTIC_SIMILARITY

app.sepay.merchant-id=test-merchant
app.sepay.secret-key=test-secret
app.sepay.checkout-url=http://localhost/sepay/checkout
app.sepay.checkout-api-url=http://localhost/payment/success
app.sepay.return-url=http://localhost/payment/error
app.sepay.cancel-url=http://localhost/payment/cancel
app.sepay.ipn-url=http://localhost/api/webhooks/sepay
app.sepay.webhook-secret=test-webhook-secret
app.sepay.api-key=
app.sepay.payout-url=

app.qdrant.url=http://localhost:6333
app.qdrant.vector-size=768
app.qdrant.distance=Cosine
app.qdrant.collection.skills=skills

