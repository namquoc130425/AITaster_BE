<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password OTP</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 30px;">
<div style="max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px;">
    <h2 style="color: #333;">AITasker Password Reset</h2>

    <p>Hello,</p>

    <p>Your OTP code is:</p>

    <h1 style="letter-spacing: 6px; color: #2563eb;" th:text="${otp}">
        123456
    </h1>

    <p>This OTP will expire in <b th:text="${expireMinutes}">5</b> minutes.</p>

    <p>If you did not request this, please ignore this email.</p>
</div>
</body>
</html>
